<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Lower Decks Mono Watch Layout</title>
        <link rel="stylesheet" type="text/css" href="../../../vendor/the-lcars/assets/lower-decks.css">
        <link rel="stylesheet" type="text/css" href="../../../lib/css/pebble-colors.css">
        <link rel="stylesheet" type="text/css" href="css/frame.css">
        <link rel="stylesheet" type="text/css" href="css/theme_lower-decks-mono.css">
    </head>
    <body>
        <div class="viewport">
            <div class="watch">
                <div class="wrap wrap-top">
                    <div class="left-frame-top">
                        <div class="sp sp-top background-harvestgold"></div>
                        <div class="sp sp-fill"></div>
                    </div>
                    <div class="right-frame-top">
                        <div class="lcars-text-bar stardate-bar">
                            <h3>Stardate</h3>
                        </div>
                        <div class="banner"></div>
                        <div class="bar-panel first-bar-panel">
                            <div class="bar-1"></div>
                            <div class="bar-2"></div>
                            <div class="bar-3"></div>
                            <div class="bar-4"></div>
                            <div class="bar-5"></div>
                        </div>
                    </div>
                </div>
                <div class="wrap" id="gap">
                    <div class="left-frame">
                        <div class="sp sp-fill seam"></div>
                        <div class="sp sp-fill seam"></div>
                        <div class="sp sp-fill seam background-daybreak"></div>
                        <div class="sp sp-fill panel-6"></div>
                    </div>
                    <div class="right-frame">
                        <div class="bar-panel">
                            <div class="bar-6"></div>
                            <div class="bar-7"></div>
                            <div class="bar-8"></div>
                            <div class="bar-9"></div>
                            <div class="bar-10"></div>
                        </div>
                        <main>
                            <div class="time"> </div>
                            <div class="readouts">
                                <div class="readout weather">
                                    <div class="lcars-text-bar">
                                        <h3>Sensors</h3>
                                    </div>
                                    <div class="data"> </div>
                                </div>
                                <div class="readout-stack">
                                    <div class="readout">
                                        <div class="lcars-text-bar">
                                            <h3>Vitals</h3>
                                        </div>
                                        <div class="data"> </div>
                                    </div>
                                    <div class="readout">
                                        <div class="lcars-text-bar">
                                            <h3>Traversal</h3>
                                        </div>
                                        <div class="data"> </div>
                                    </div>
                                </div>
                            </div>
                        </main>
                    </div>
                </div>
            </div>
        </div>
        <script>
            if (location.search.indexOf('frame') >= 0) {
              document.documentElement.classList.add('frame-render');
              document.querySelectorAll('.time, .banner, .data')
                      .forEach(function (el) { el.textContent = ''; });
            }
        </script>
    </body>
</html>
