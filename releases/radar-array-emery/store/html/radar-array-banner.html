<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Radar Array — store banner</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #000000;
      --primary: #00FF00;
      --secondary: #FFAA00;
      --secondary-dim: #AA5500;
      --tertiary: #FF5500;
      --grid-primary: rgba(0, 255, 0, 0.06);
      --grid-secondary: rgba(255, 170, 0, 0.22);
    }

    html,
    body {
      display: block;
      margin: 0;
      padding: 0;
      background: #000;
    }

    .banner-page {
      width: 720px;
      height: 320px;
      background: var(--bg);
      overflow: hidden;
      position: relative;
      font-family: 'Share Tech Mono', monospace;
    }

    .grid {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-image:
        linear-gradient(var(--grid-primary) 1px, transparent 1px),
        linear-gradient(90deg, var(--grid-primary) 1px, transparent 1px);
      background-size: 40px 40px;
      background-position: center center;
      z-index: 1;
    }

    .scanlines {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: repeating-linear-gradient(
        to bottom,
        transparent,
        transparent 2px,
        rgba(0, 0, 0, 0.2) 3px,
        rgba(0, 0, 0, 0.2) 4px
      );
      z-index: 10;
      pointer-events: none;
    }

    .wrap {
      position: relative;
      z-index: 5;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 100%;
      padding: 0 50px;
      box-sizing: border-box;
    }

    .copy {
      display: flex;
      flex-direction: column;
      justify-content: center;
      flex: 1;
      text-shadow: 0 0 5px var(--primary);
    }

    .copy .kicker {
      color: var(--secondary);
      font-size: 16px;
      letter-spacing: 4px;
      font-weight: normal;
      text-shadow: 0 0 5px var(--secondary);
    }

    .copy h1 {
      margin: 5px 0 15px 0;
      color: var(--primary);
      font-size: 64px;
      font-weight: normal;
      line-height: 0.9;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .copy h1 .sub {
      display: block;
      color: var(--primary);
      font-size: 48px;
      opacity: 0.8;
    }

    .copy .features {
      margin: 0;
      padding: 0;
      list-style: none;
      border-left: 2px solid var(--secondary-dim);
      padding-left: 15px;
    }

    .copy .features li {
      color: #e0ffe0;
      font-size: 18px;
      letter-spacing: 1px;
      margin-bottom: 8px;
      white-space: nowrap;
    }

    .copy .features li::before {
      content: ">";
      display: inline-block;
      color: var(--secondary);
      margin-right: 10px;
      text-shadow: 0 0 5px var(--secondary);
    }

    .device-container {
      flex: none;
      position: relative;
    }

    .device-container::before,
    .device-container::after {
      content: "";
      position: absolute;
      width: 30px;
      height: 30px;
      border: 3px solid var(--secondary);
      z-index: -1;
    }

    .device-container::before {
      top: -15px;
      left: -15px;
      border-right: none;
      border-bottom: none;
    }

    .device-container::after {
      bottom: -15px;
      right: -15px;
      border-left: none;
      border-top: none;
    }

    .device {
      position: relative;
      z-index: 2;
    }

    .device .bezel {
      background: #111;
      border: 6px solid #222;
      border-radius: 26px;
      padding: 13px;
      box-shadow: 0 0 0 2px #000, 0 15px 35px rgba(0, 255, 0, 0.15);
    }

    .device .screen {
      width: 196px;
      height: 223px;
      display: block;
      border-radius: 6px;
      image-rendering: pixelated;
    }
  </style>
</head>
<body>
  <div class="banner-page">
    <div class="grid"></div>
    <div class="scanlines"></div>

    <div class="wrap">
      <div class="copy">
        <div class="kicker">TACTICAL HUD WATCHFACE</div>

        <h1>
          RADAR
          <span class="sub">ARRAY</span>
        </h1>

        <ul class="features">
          <li>Authentic CRT scope.</li>
          <li>Live weather &amp; conditions.</li>
          <li>Heart rate &amp; step tracking.</li>
          <li>Bluetooth connection alerts.</li>
        </ul>
      </div>

      <div class="device-container">
        <div class="device">
          <div class="bezel">
            <img class="screen" src="../theme_default.png" alt="Radar Array watchface">
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
